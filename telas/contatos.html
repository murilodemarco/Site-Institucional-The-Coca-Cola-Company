            </p>
            <form action="" id="frmContato">
                <fieldset class="form">
                    <legend>Dados Pessoais</legend>
                    <label for="">Nome e Sobrenome</label>
                    <input type="text" id="nomesobrenome" name="" class="input-padrao" required>

                    <label for="">E-mail</label>
                    <input type="email" id="email" name="" class="input-padrao" placeholder="seuemail@dominio.com">

                    <label for="">Telefone</label>
                    <input type="tel" id="telefone" name="" class="input-padrao" placeholder="(XX) XXXXX-XXXX">

                    <label for="">Mensagem</label>
                    <textarea cols="80" rows="10" name="" id="mensagem" class="input-padrao" required></textarea>

                    <label for="">Como você prefere nosso contato?
                        <input type="radio" value="radio-mail" name="Contato">E-mail
                        <input type="radio" value="radio-telefone" name="Contato"> Telefone
                        <input type="radio" value="radio-whatsapp" name="Contato">Whatsapp

                    </label>
                    <br>
                    <label for="">Qual o motivo do seu contato?
                        <select name="" id="opcoes">
                            <option value="">Selecione</option>
                            <option value="">Dúvida</option>
                            <option value="">Sugestão</option>
                            <option value="">Elogio</option>
                            <option value="">Reclamação</option>
                        </select>
                    </label>
                    <br>
                </fieldset>

                <label for=""><input type="checkbox" class="chk">Gostaria de receber nossas novidade por email?</label>
                <br>

                
                <input type="submit" id="enviar" value="Enviar formulario" class="enviar">

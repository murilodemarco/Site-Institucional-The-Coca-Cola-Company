<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop-UP Produto</title>
    <link rel="stylesheet" href="../css/popup.css">
   
</head>

<body>
    <main>
        <div class="pop">
            <h1 id="nome_produto"></h1>
            <!-- <img id="img_produto" src="" alt=""> -->
             <!-- Slider de fotos -->
             <div class="slider">
                <button id="prevBtn">&#10094;</button>
                <img id="slider-img" src="" alt="">
                <button id="nextBtn">&#10095;</button>
             </div>

            <p id="desc_produto"></p>  

            <!-- Captura as informações do parâmetro-->
            <script>
                //Função para capturar os parâmetros da POP
                function getParametro(infoCapturar){
                    urlParametro=new URLSearchParams(window.location.search);
                    return urlParametro.get(infoCapturar);
                }

                //Preenche as informações no layout
                document.getElementById("nome_produto").textContent = getParametro("nomeProduto");
                //document.getElementById("img_produto").src = getParametro("imgProduto");
                document.getElementById("desc_produto").textContent = getParametro("descProduto");


                //Código do Slider
                const imagens=getParametro('imgProduto')
                        ? getParametro("imgProduto").split(',')
                        : [];
                let index = 0;
                //Guarda o elemento HTML do slider
                const sliderImg = document.getElementById("slider-img");
                
                // Coloca a imagem dentro do slider
                function MostrarImagens(){
                    if(imagens.length > 0){
                        sliderImg.src = imagens[index];
                    }
                }
                
                document.getElementById("prevBtn").onclick = function(){
                    index = (index-1 + imagens.length) % imagens.length;
                    MostrarImagens();
                }
                document.getElementById("nextBtn").onclick = function(){
                    index = (index+1) % imagens.length;
                    MostrarImagens();
                }

                //Exibe a primeira imagem
                MostrarImagens();
            </script>
        </div> 
    </main> 
</body>

</html>
